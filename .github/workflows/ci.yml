name: CI 测试

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  # ── 后端测试 ──────────────────────────────────────
  backend-test:
    name: 后端 pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行 pytest
        run: |
          python -m pytest test/ -v \
            --tb=short \
            -q

  # ── 前端检查 ──────────────────────────────────────
  frontend-check:
    name: 前端 lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: Lint 检查
        run: npm run lint

      - name: 构建检查
        run: npm run build
