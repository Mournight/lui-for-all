name: Docker Build & Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: sh
    env:
      COMPOSE_FILE: docker-compose.yml
      COMPOSE_PROJECT_NAME: lui-for-all

    steps:
      - name: 检出代码
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITEA_TOKEN: ${{ gitea.token }}
        run: |
          echo "检出仓库代码..."
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache git curl
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y git curl
          fi

          TOKEN="${GITHUB_TOKEN:-${GITEA_TOKEN:-}}"
          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"

          if [ -d .git ]; then
            git remote set-url origin "$REPO_URL" || true
          else
            git init .
            git remote add origin "$REPO_URL"
          fi

          if [ -n "$TOKEN" ]; then
            git -c http.extraHeader="Authorization: Bearer ${TOKEN}" fetch --depth=1 origin "$GITHUB_SHA"
          else
            echo "未检测到 Token，将尝试匿名拉取（仅公开仓库可用）"
            git fetch --depth=1 origin "$GITHUB_SHA"
          fi

          git checkout --force FETCH_HEAD
          git submodule update --init --recursive || true

      - name: 构建 Docker 镜像
        run: |
          echo "开始构建镜像..."
          DOCKER_BUILDKIT=1 docker compose -f "$COMPOSE_FILE" build

      - name: 启动容器
        env:
          LLM_KEY: ${{ secrets.LLM_KEY }}
          LUI_MCP_API_TOKEN: ${{ secrets.LUI_MCP_API_TOKEN }}
        run: |
          export LLM_KEY="${LLM_KEY:-test-master-key}"
          export LUI_MCP_API_TOKEN="${LUI_MCP_API_TOKEN:-}"

          echo "启动容器编排..."
          docker compose -f "$COMPOSE_FILE" up -d --remove-orphans

      - name: 等待服务健康
        run: |
          services="sample-fastapi sample-node lui-backend lui-frontend"
          attempt=0
          max_attempt=30
          all_ok=false

          while [ "$attempt" -lt "$max_attempt" ]; do
            all_ok=true
            echo "健康检查轮次: $((attempt + 1))/$max_attempt"

            for service in $services; do
              if ! docker ps --format '{{.Names}}' | grep -q "^${service}$"; then
                echo "容器未运行: ${service}"
                all_ok=false
                continue
              fi

              health="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}running{{end}}' "${service}")"
              echo "${service}: ${health}"

              if [ "$health" != "healthy" ] && [ "$health" != "running" ]; then
                all_ok=false
              fi
            done

            if [ "$all_ok" = true ]; then
              break
            fi

            attempt=$((attempt + 1))
            sleep 5
          done

          if [ "$all_ok" != true ]; then
            echo "服务未在预期时间内就绪，输出诊断信息"
            docker compose -f "$COMPOSE_FILE" ps
            docker compose -f "$COMPOSE_FILE" logs --tail=120
            exit 1
          fi

      - name: 冒烟验证
        run: |
          echo "验证主服务端点..."
          curl -fsS http://127.0.0.1:8000/health
          curl -fsSI http://127.0.0.1:5173 > /dev/null

          echo "验证测试服务在 Docker 网络内可访问..."
          docker exec lui-backend python -c "import urllib.request; urllib.request.urlopen('http://sample-fastapi:8010/openapi.json').read(); urllib.request.urlopen('http://sample-node:8020/openapi.json').read(); print('sample backends reachable')"

      - name: 清理悬空镜像
        run: docker image prune -f || true
